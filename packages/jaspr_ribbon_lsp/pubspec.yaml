name: jaspr_ribbon_lsp
description: "Language Server Protocol server for .ribbon JSON bundles used by jaspr_ribbon_toolbar. Provides validation, diagnostics, and (later) autocomplete for editors and the visual designer."
version: 0.2.0
publish_to: none

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  jaspr_ribbon_toolbar:
    path: ../jaspr_ribbon_toolbar
  lsp_server: ^0.4.0

dev_dependencies:
  test: ^1.24.0

executables:
  jaspr_ribbon_lsp: jaspr_ribbon_lsp
