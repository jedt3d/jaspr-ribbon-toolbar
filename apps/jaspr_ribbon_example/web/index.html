<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <title>jaspr-ribbon-toolbar demo</title>
    <style>
        body {
            margin: 0;
            padding: 24px 28px 48px;
            font-family: "Segoe UI", system-ui, sans-serif;
            color: #1e1e1e;
            background: #ffffff;
        }
        h1 { font-size: 20px; margin: 0 0 4px; }
        h2 { font-size: 14px; margin: 24px 0 6px; color: #555; text-transform: uppercase; letter-spacing: .04em; }
        .lead { color: #666; margin: 0 0 16px; font-size: 13px; }
        canvas { display: block; border: 1px solid #d2d2d2; border-radius: 4px; background: #f5f5f5; }
        .log {
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            font-size: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 6px;
            padding: 10px 14px;
            max-height: 180px;
            overflow: auto;
            margin: 0;
        }
        .log li { list-style: none; padding: 1px 0; }
        .log .tag { color: #4fc3f7; }
        .toolbar { margin-bottom: 16px; }
    </style>
</head>

<body></body>

</html>
