name: jaspr_ribbon_designer
description: "Standalone visual designer for jaspr-ribbon-toolbar — build, edit and save .ribbon bundles with a live canvas preview."
version: 0.5.0
publish_to: none

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  archive: ^4.0.9
  jaspr: ^0.23.1
  jaspr_ribbon_toolbar:
    path: ../../packages/jaspr_ribbon_toolbar
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  test: ^1.24.0

jaspr:
  mode: client
