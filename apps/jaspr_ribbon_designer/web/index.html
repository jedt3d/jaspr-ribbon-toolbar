<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <title>jaspr-ribbon-toolbar Designer</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --panel: #ffffff;
            --border: #dfe3e8;
            --muted: #6b7280;
            --accent: #0078d4;
            --accent-soft: #e6f0fa;
            --row-sel: #c8dcf0;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            height: 100%;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 13px;
            color: #1f2937;
            background: var(--bg);
        }
        body { display: flex; flex-direction: column; height: 100vh; }

        /* Jaspr attaches the App root <div> to <body>; it must fill the body and
           be a flex column so the rows below (preview / toolbar / main / status)
           lay out and the footer sticks to the bottom. */
        .app-root {
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* Row 1 — full-width live preview */
        .preview-row {
            background: #fafbfc;
            border-bottom: 1px solid var(--border);
            padding: 4px;
            flex: 0 0 auto;
        }
        .preview-host canvas {
            display: block;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #f5f5f5;
        }

        /* Row 2 — toolbar */
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 14px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex: 0 0 auto;
        }
        .toolbar-row select, .toolbar-row input[type=text] {
            font: inherit;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 0;
            background: #fff;
        }
        .btn {
            font: inherit;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 0;
            background: #fff;
            cursor: pointer;
        }
        .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.danger { color: #b00020; }
        .spacer { flex: 1; }

        /* Row 3 — three panes */
        .main {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
            gap: 1px;
            background: var(--border);
            overflow: hidden;
        }
        .panel { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .panel h3 {
            margin: 0; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
            letter-spacing: .05em; color: var(--muted);
            border-bottom: 1px solid var(--border); background: #fafbfc;
        }
        .panel .body { flex: 1; overflow: auto; padding: 6px; }
        .icon-toolbar { padding: 8px 8px 4px; border-bottom: 1px solid var(--border); }

        /* Preview caption (kept minimal) */
        .preview-cap { color: var(--muted); font-size: 11px; margin: 6px 4px; }

        /* Tree rows */
        .tree-row {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 6px; border-bottom: 1px solid var(--border);
            border-radius: 0; cursor: pointer; white-space: nowrap;
        }
        .tree-row:hover { background: var(--accent-soft); }
        .tree-row.selected { background: var(--row-sel); }
        .tree-row .cap { font-weight: 500; }
        .tree-row.l0 .cap { font-weight: 700; }
        .tree-row .badge { font-size: 10px; color: var(--muted); background: #eef1f4; padding: 1px 6px; border-radius: 0; }
        .tree-row .tag { color: #9aa1ab; font-size: 11px; }

        /* Inspector fields */
        .field { margin: 6px 4px; }
        .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
        .field input[type=text], .field select {
            width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 0; font: inherit;
        }
        .field .row { display: flex; align-items: center; gap: 6px; }
        .mi-row { display: flex; gap: 4px; margin: 4px 0; }
        .mi-row input { flex: 1; padding: 4px 6px; border: 1px solid var(--border); border-radius: 0; font: inherit; }
        .empty { color: var(--muted); font-style: italic; padding: 12px 8px; text-align: center; }

        /* Icons — multi-column grid, sorted, scrollable */
        .iconlib {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
            gap: 6px;
            align-content: start;
        }
        .icon-card {
            position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 4px 6px; border: 1px solid var(--border); border-radius: 0; background: #fff;
            cursor: pointer; text-align: center;
        }
        .icon-card:hover { border-color: var(--accent); }
        .icon-card.assigned { border-color: var(--accent); background: var(--accent-soft); }
        .icon-card img { width: 26px; height: 26px; object-fit: contain; background: #f3f4f6; border-radius: 0; padding: 2px; }
        .icon-card .key {
            font-size: 10px; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; color: #444; cursor: text;
        }
        .icon-card input.rename {
            font: 10px "Segoe UI", system-ui, sans-serif; width: 100%;
            border: 1px solid var(--accent); border-radius: 0; padding: 1px 3px; text-align: center;
        }
        .icon-card .del {
            position: absolute; top: 2px; right: 4px; color: #b00020; cursor: pointer;
            font-size: 11px; line-height: 1;
        }

        /* Status bar */
        .statusbar {
            padding: 5px 14px; background: #2b2b2b; color: #ccc;
            font-size: 11px; border-top: 1px solid #1b1b1b;
            display: flex; justify-content: space-between;
            flex: 0 0 auto;
        }
    </style>
</head>

<body></body>

</html>
