<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <title>Tutorial 2 — Events, toggles & contextual tabs</title>
    <style>
        body { margin: 0; padding: 24px 28px 48px; font-family: "Segoe UI", system-ui, sans-serif; color: #1e1e1e; background: #fff; }
        h1 { font-size: 20px; margin: 0 0 4px; }
        h2 { font-size: 13px; margin: 22px 0 6px; color: #555; text-transform: uppercase; letter-spacing: .04em; }
        .lead { color: #666; margin: 0 0 12px; font-size: 13px; }
        canvas { display: block; border: 1px solid #d2d2d2; background: #f5f5f5; }
        .controls { display: flex; gap: 8px; margin: 10px 0 0; }
        button { font: inherit; padding: 5px 12px; border: 1px solid #d2d2d2; border-radius: 0; background: #fff; cursor: pointer; }
        button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
        .state { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: #f4f5f7; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 14px; }
        .state div { padding: 1px 0; }
        .state .k { color: #555; }
        .state .on { color: #0078d4; font-weight: 600; }
        .log { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; border-radius: 6px; padding: 10px 14px; max-height: 160px; overflow: auto; margin: 0; }
        .log li { list-style: none; padding: 1px 0; }
    </style>
</head>

<body>
    <script defer src="main.client.dart.js"></script>
</body>

</html>
