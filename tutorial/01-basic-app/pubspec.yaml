name: tutorial_01_basic_app
description: "Tutorial 1 — embed the jaspr-ribbon-toolbar in a Jaspr app; load a .ribbon bundle and log events."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  jaspr: ^0.23.1
  jaspr_ribbon_toolbar:
    path: ../../packages/jaspr_ribbon_toolbar
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1

jaspr:
  mode: client
