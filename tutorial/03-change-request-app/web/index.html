<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <title>Tutorial 3 — Change request</title>
    <style>
        body { margin: 0; padding: 24px 28px 48px; font-family: "Segoe UI", system-ui, sans-serif; color: #1e1e1e; background: #fff; }
        body.dark { background: #1e1e1e; color: #e5e7eb; }
        h1 { font-size: 20px; margin: 0 0 4px; }
        h2 { font-size: 13px; margin: 22px 0 6px; color: #555; text-transform: uppercase; letter-spacing: .04em; }
        body.dark h2 { color: #9ca3af; }
        .lead { color: #666; margin: 0 0 12px; font-size: 13px; }
        body.dark .lead { color: #9ca3af; }
        canvas { display: block; border: 1px solid #d2d2d2; }
        .filelist { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: #f4f5f7; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 14px; min-height: 40px; }
        body.dark .filelist { background: #2a2a2a; border-color: #3a3a3a; }
        .filelist .hidden { color: #9ca3af; font-style: italic; }
        .log { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: #111; color: #d4d4d4; border-radius: 6px; padding: 10px 14px; max-height: 160px; overflow: auto; margin: 0; }
        .log li { list-style: none; padding: 1px 0; }
    </style>
